<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px;
    cursor:pointer;
    background:#007bff;
    color:white;
    border:none;
}

ul{
    list-style:none;
    padding:0;
    margin-top:15px;
}

li{
    padding:10px;
    background:#eee;
    margin-top:8px;
    display:flex;
    justify-content:space-between;
}

.delete{
    background:red;
    border:none;
    color:white;
    padding:5px 8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>Todo App</h1>

<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>
</div>

<script>
function addTask(){
    const input = document.getElementById("taskInput");
    const value = input.value.trim();

    if(value === "") return;

    const li = document.createElement("li");
    li.innerHTML = `
        ${value}
        <button class="delete" onclick="this.parentElement.remove()">X</button>
    `;

    document.getElementById("list").appendChild(li);
    input.value = "";
}
</script>

</body>
</html>
